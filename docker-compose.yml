version: "3.9"

services:
  api:
    build: .
    image: local-llm-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Default to host.docker.internal so the API container can reach a host-running Ollama
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      # Ensures host.docker.internal resolves on Linux
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Uncomment to depend on the bundled Ollama service (see profile below)
    # depends_on:
    #   - ollama

  # Optional: run Ollama inside compose (enable with `--profile ollama`)
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  ollama:
    driver: local

